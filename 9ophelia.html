<!DOCTYPE html>
<html>
    <head>
        <title>learning switch statement</title>
    </head>
    <body>
        <h2>This is a program which lets you enter five numbers and then you can:</h2>
        <ol>
            <li>Add the numbers</li>
            <li>subtract the numbers</li>
            <li>multiply the numbers</li>
            <li>find the greatest number</li>
            <li>find the least number</li>
            <li>find the average of the numbers</li>
        </ol>
        <input type="text" id="num1" placeholder="Enter no.1">
        <br><br>
        <input type="text" id="num2" placeholder="Enter no.2">
        <br><br>
        <input type="text" id="num3" placeholder="Enter no.3">
        <br><br>
        <input type="text" id="num4" placeholder="Enter no.4">
        <br><br>
        <input type="text" id="num5" placeholder="Enter no.5">
        <br><br>
        <div class="button">
            <p>Click any of the button to get the desired result</p>
            <button onclick="calculate(1)">1</button>
            <button onclick="calculate(2)">2</button>
            <button onclick="calculate(3)">3</button>
            <button onclick="calculate(4)">4</button>
            <button onclick="calculate(5)">5</button>
            <button onclick="calculate(6)">6</button>
        </div>
        <p id="result"></p>
        <script>
            function calculate(choice){
                let a=parseFloat(document.getElementById("num1").value);
                let b=parseFloat(document.getElementById("num2").value);
                let c=parseFloat(document.getElementById("num3").value);
                let d=parseFloat(document.getElementById("num4").value);
                let e=parseFloat(document.getElementById("num5").value);
                let result;
                
                switch(choice){
                    case 1:
                        result=a+b+c+d+e;
                        break;
                    case 2:
                       result= a-b-c-d-e;
                        break;
                    case 3: 
                    result=a*b*c*d*e;
                    break;       
                    case 4:  
                    result=Math.max(a,b,c,d,e);
                    break;      
                    case 5:  
                   result= Math.min(a,b,c,d,e);   
                   break;   
                    case 6: result= (a+b+c+d+e)/5  ;  
                    break;
                 default: result="Invalid"; 
                }
                document.getElementById("result").innerHTML=result;
            }
        </script>

    </body>
</html>
