        <script>
             function playMusic(){
              var music=document.getElementById('music');
              var btn=document.getElementById('topBtn')
                if(music.paused){
                    music.play();
                    topBtn.textContent="Start";}
                    else{
                        music.pause();
                        topBtn.textContent="Stop";
                    }
            }
            const vid1=document.getElementById('vid1');
            const vid2=document.getElementById('vid2');
            const popup=document.getElementById('popup');
            const yesBtn=document.getElementById('yesBtn');
            const noBtn=document.getElementById('noBtn');
            const mainContent=document.getElementById('mainContent');
            vid1.addEventListener('ended', function(){
                vid1.style.display='none';
                vid2.style.display='block';
                vid2.play();
                popup.style.display='block';
            })
            yesBtn.addEventListener('click',function(){
                document.querySelector('.animation').style.display='none';
                popup.style.display='none';
                mainContent.style.display='block';
            })
            noBtn.addEventListener('mouseover', function(){

    const popupRect = popup.getBoundingClientRect();

    const buttonWidth = noBtn.offsetWidth;
    const buttonHeight = noBtn.offsetHeight;

    const maxX = popupRect.width - buttonWidth;
    const maxY = popupRect.height - buttonHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    
});
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');

leftBtn.addEventListener('click', function(){

    mainContent.scrollBy({
        left: -200,
        behavior: 'smooth'
    });

});

rightBtn.addEventListener('click', function(){

    mainContent.scrollBy({
        left: 200,
        behavior: 'smooth'
    });

});
window.onload = function () {

    const girl = document.getElementById("girl");

    /* move to center */

    setTimeout(function () {

        girl.style.right = "45%";

    }, 100);


    /* after movement finishes */

    setTimeout(function () {

        girl.src = "girlback.png";

    }, 2100);

};

const girl = document.getElementById("girl");

/* WALK when button is pressed */

function startWalking() {

    girl.src = "";
    girl.src = "Illustration50.gif";

}

/* STOP when button is released */

function stopWalking() {

    girl.src = "girlback.png";

}

let scrollInterval;

/* START scrolling */

function startScrollLeft() {

    startWalking();

    scrollInterval = setInterval(function () {

        mainContent.scrollBy({
            left: -15,
            behavior: "auto"
        });

    }, 16); // ~60 FPS

}

function startScrollRight() {

    startWalking();

    scrollInterval = setInterval(function () {

        mainContent.scrollBy({
            left: 5,
            behavior: "auto"
        });

    }, 16);

}

/* STOP scrolling */

function stopScroll() {

    clearInterval(scrollInterval);

    stopWalking();

}

/* LEFT BUTTON */

leftBtn.addEventListener("mousedown", startScrollLeft);
leftBtn.addEventListener("mouseup", stopScroll);
leftBtn.addEventListener("mouseleave", stopScroll);

/* RIGHT BUTTON */

rightBtn.addEventListener("mousedown", startScrollRight);
rightBtn.addEventListener("mouseup", stopScroll);
rightBtn.addEventListener("mouseleave", stopScroll);
